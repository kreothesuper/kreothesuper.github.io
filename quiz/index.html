<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        .quiz *{
            margin: 0;
            padding: 0;

            box-sizing: border-box;
        }
        .quiz{
            font-family: 'Monsterrat', sans-serif;
            font-weight: 400;

            height: 100%;
            width: 100%;

            position: fixed;
            top: 0;
            left: 0;

            background-color: #eeeeee;
        }
        .quiz__wrapper{
            padding: 30px 15px;

            max-width: 1240px;
            margin: 0 auto;

            display: flex;
            flex-direction: column;

            height: 100%;
        }
        .quiz__header{
            flex-shrink: 0;
        }
        .quiz__content{
            height: 100%;
            width: 100%;
            flex: 100%;
        }
        .quiz__footer{
            flex-shrink: 0;
        }
        .quiz__title-label{
            font-size: 16px;
            color: #535352;
            font-weight: 700;

            text-align: center;
        }
        .quiz__desc{
            margin: 15px 0 0 0;
        }
        .quiz__desc-label{
            font-size: 12px;
            color:rgba(83, 83, 82, 0.97);
            text-align: center;
        }
        .quiz__content{
            background-color: #fff;

            margin: 30px 0;
        }
        .quiz__footer{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quiz__button{
            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 12px;
            color:#fff;
            width: 200px;
            height: 35px;
            background-color: #cd9e50;

            text-decoration: none;

            border: none;
            outline: none;
        }

        .quiz-input{
            width: 100%;
            height: 100%;
        }

        .quiz-input__item{
            display: none;
        }
        .quiz-input__checkmark{
            width: 14px;
            height: 14px;

            border-radius: 50%;
            flex-shrink: 0;

            display: block;

            border:1px solid #535352;
            position: absolute;
            right: 10px;
            top: 10px;
        }

        .quiz-input__checkmark::before{
            content: '';
            width: 8px;
            height: 8px;

            position: absolute;
            top: calc(50% - 4px);
            left: calc(50% - 4px);

            display: block;
            border-radius: 50%;

            background-color: #cd9e50;

            opacity: 0;

            transition: .3s linear opacity;
        }

        .quiz-input__item:checked ~ .quiz-input__checkmark::before{
            opacity: 1;
        }

        .quiz-input__wrapper{
            display: flex;
            align-items: center;
            justify-content: center;

            width: 100%;
            height: 100%;

            position: relative;
        }

        .quiz-input__wrapper:hover{
            cursor: pointer;
        }

        .quiz-question__title{
            font-size: 16px;
            color:#535352;
            font-weight: 700;

            text-align: center;
        }
        .quiz-question__wrapper{
            padding: 30px 120px;
        }
        .quiz-question__content{
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(0,1fr));
            grid-auto-rows: 100px;
            gap: 30px;

            margin: 30px 0 0 0;
        }
        .quiz-question__radio{
            display: flex;
            align-items: center;
            justify-content: center;

            height: 100%;

            border-radius: 15px;
            border: 1px solid #cd9e50;
        }

        .quiz-input__label{
            font-size: 14px;
        }
        .quiz__content-row{
            position: relative;

            width: 100%;
            height: 100%;
        }
        .quiz__content{
            overflow: hidden;
        }
        .quiz__content-block{
            position: absolute;
            width: 100%;
            height: 100%;
            
            top: 0;
            left: 0;

            transform: translateX(100%);

            background-color: #Fff;

            transition: .7s all linear;
        }
        .quiz__content-block.active{
            transform: translateX(0);
        }
        .quiz-question{
            height: 100%;
        }
        .quiz-question__title{
            max-width: 350px;
            margin: 0 auto;
        }
        .quiz-question__final{
            max-width: 300px;
            margin: 30px auto 0 auto;
            width: 100%;
        }
        .quiz-question__input{
            width: 100%;

            display: flex;
            align-items: center;
            justify-content: center;
        }
        .quiz-question__input + .quiz-question__input{
            margin: 15px 0 0 0;
        }
        .quiz-question__input-item{
            -webkit-appearance: none;
            height: 30px;
            width: 100%;

            background: none;
            outline: none;

            border: 1px solid #cd9e50;

            padding: 15px;

            font-family: 'Monsterrat', sans-serif;
        }
        .quiz__footer.hidden,.quiz__header.hidden{
            display: none;
        }
        .quiz-question__wrapper-center{
            padding: 120px 30px 30px 30px;
        }

        .quiz-bar__wrapper{
            width: 400px;
            height: 5px;

            position: relative;

            background: #fff;
            flex-shrink: 0;

            border-radius: 5px;

            border:1px solid rgba(0,0,0,.1);

            overflow: hidden;
        }

        .quiz-bar__line{
            position: absolute;
            height: 100%;

            background: #cd9e50;

            transition: .3s width;
        }

        @media screen and (max-width: 767px) {
            .quiz-question__wrapper{
                padding: 30px;
            }
            .quiz-question__wrapper-center{
                padding: 60px 30px 30px 30px;
            }
            .quiz-question__content{
                grid-auto-rows: 50px;
            }
            .quiz__footer{
                flex-direction: column;
            }
            .quiz-bar{
                margin: 0 0 30px 0;

                width: 100%;
            }
            .quiz-bar__wrapper{
                width: 100%;
            }
        }
        @media screen and (max-width: 500px) {
            .quiz-question__content{
                grid-template-columns: minmax(0,1fr);
                gap: 15px;
            }
        }
    </style>
</head>
<body>
<div class="quiz">
    <div class="quiz__wrapper">
        <div class="quiz__header">
            <div class="quiz__title">
                <p class="quiz__title-label">
                    Ответь на несколько вопросов о себе
                </p>
            </div>
            <div class="quiz__desc">
                <p class="quiz__desc-label">
                    Это поможет нам
                </p>
            </div>
        </div>
        <div class="quiz__content">
            <div class="quiz__content-row">
                <div class="quiz__content-block">
                    <div class="quiz-question">
                        <div class="quiz-question__wrapper">
                            <div class="quiz-question__header">
                                <p class="quiz-question__title">
                                    Семейное положение
                                </p>
                            </div>
                            <div class="quiz-question__content">
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="marital" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">Холост</span>
                                        </span>
                                    </label>
                                </div>
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="marital" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">Молодая семья</span>
                                        </span>
                                    </label>
                                </div>
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="marital" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">Семья с детьми</span>
                                        </span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="quiz__content-block">
                    <div class="quiz-question">
                        <div class="quiz-question__wrapper">
                            <div class="quiz-question__header">
                                <p class="quiz-question__title">
                                    Выбор этажа
                                </p>
                            </div>
                            <div class="quiz-question__content">
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="floor" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">8</span>
                                        </span>
                                    </label>
                                </div>
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="floor" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">9</span>
                                        </span>
                                    </label>
                                </div>
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="floor" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">10</span>
                                        </span>
                                    </label>
                                </div>
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="floor" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">11</span>
                                        </span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="quiz__content-block">
                    <div class="quiz-question">
                        <div class="quiz-question__wrapper">
                            <div class="quiz-question__header">
                                <p class="quiz-question__title">
                                    Наличие материнского капитала
                                </p>
                            </div>
                            <div class="quiz-question__content">
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="capital" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">Да</span>
                                        </span>
                                    </label>
                                </div>
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="capital" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">Нет</span>
                                        </span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="quiz__content-block">
                    <div class="quiz-question">
                        <div class="quiz-question__wrapper">
                            <div class="quiz-question__header">
                                <p class="quiz-question__title">
                                    Процентные ставки по ипотеке
                                </p>
                            </div>
                            <div class="quiz-question__content">
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="rates" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">Семейная от 5,3%</span>
                                        </span>
                                    </label>
                                </div>
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="rates" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">Господдержка от 6,3%</span>
                                        </span>
                                    </label>
                                </div>
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="rates" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">Господдержка + от 6,7%</span>
                                        </span>
                                    </label>
                                </div>
                                <div class="quiz-question__radio">
                                    <label class="quiz-input">
                                        <span class="quiz-input__wrapper">
                                            <input type="radio" name="rates" class="quiz-input__item">
                                            <span class="quiz-input__checkmark"></span>
                                            <span class="quiz-input__label">Базовая от 10%</span>
                                        </span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="quiz__content-block">
                    <div class="quiz-question">
                        <div class="quiz-question__wrapper quiz-question__wrapper-center">
                            <div class="quiz-question__header">
                                <p class="quiz-question__title">
                                    ОСТАВЬТЕ СВОИ КОНТАКТНЫЕ ДАННЫЕ, И МЫ ВАМ ПЕРЕЗВОНИМ
                                </p>
                            </div>
                            <div class="quiz-question__final">
                                <div class="quiz-question__input">
                                    <input class="quiz-question__input-item" type="text" name="name" placeholder="Имя">
                                </div>
                                <div class="quiz-question__input">
                                    <input class="quiz-question__input-item" type="text" name="phone" placeholder="Номер телефона">
                                </div>
                                <div class="quiz-question__input">
                                    <input type="submit" value="Отправить" class="quiz__button">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="quiz__footer">
            <div class="quiz-bar">
                <div class="quiz-bar__wrapper">
                    <div class="quiz-bar__line"></div>
                </div>
            </div>
            <a href="#" class="quiz-next quiz__button">
                Далее
            </a>
        </div>
    </div>
</div>

<script>
    const quiz = document.querySelector('.quiz');

    if(quiz !== null){
        const quizContentBlockArray = [...quiz.querySelectorAll('.quiz__content-block')],
            quizQuestionInput = quiz.querySelectorAll('.quiz-question__radio'),
            quizFooter = quiz.querySelector('.quiz__footer'),
            quizHeader = quiz.querySelector('.quiz__header'),
            quizBarLine = quiz.querySelector('.quiz-bar__line');

        const quizChange = (quiz,index = 0) =>{
            quizContentBlockArray.forEach((quizElement,quizIndex)=>{
                index === quizIndex ? quizElement.classList.add('active') : quizElement.classList.remove('active');
            });

            quizBarLine.style.width = `${((index + 1) / quizContentBlockArray.length) * 100}%`

            if(index + 1 === quizContentBlockArray.length){
                quizHeader.classList.add('hidden');
                quizFooter.classList.add('hidden');
            }
        }

        quizQuestionInput.forEach(element=>{
           element.addEventListener('change',()=>{
               const currentQuiz = quiz.querySelector('.quiz__content-block.active');

               console.log();

               quizChange(quiz, quizContentBlockArray.indexOf(currentQuiz) + 1)
           });
        });

        quizChange(quiz);
    }
</script>
</body>
</html>
